name: Daily ASX Announcements

on:
  # ASX trades 10:00 AM – 4:00 PM AEST (23:00 – 05:00 UTC)
  # Runs every 20 minutes across the full session Mon–Fri
  # Using offset minutes (3,23,43) to avoid peak GitHub scheduler congestion
  schedule:
    - cron: "3,23,43 23 * * 1-5"   # 23:03, 23:23, 23:43 UTC  (10:03–10:43 AM AEST)
    - cron: "3,23,43 0  * * 2-6"   # 00:03, 00:23, 00:43 UTC  (11:03–11:43 AM AEST)
    - cron: "3,23,43 1  * * 2-6"   # 01:03, 01:23, 01:43 UTC  (12:03–12:43 PM AEST)
    - cron: "3,23,43 2  * * 2-6"   # 02:03, 02:23, 02:43 UTC  (01:03–01:43 PM AEST)
    - cron: "3,23,43 3  * * 2-6"   # 03:03, 03:23, 03:43 UTC  (02:03–02:43 PM AEST)
    - cron: "3,23,43 4  * * 2-6"   # 04:03, 04:23, 04:43 UTC  (03:03–03:43 PM AEST)
    - cron: "3,23,43 5  * * 2-6"   # 05:03, 05:23, 05:43 UTC  (04:03–04:43 PM AEST)

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: "Date to fetch (YYYY-MM-DD). Leave blank for today AEST."
        required: false
        default: ""

jobs:
  fetch-and-summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit logs/ back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ASX fetcher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python fetch_asx.py --date "${{ github.event.inputs.date }}"
          else
            python fetch_asx.py
          fi

      - name: Commit and push log file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --cached --quiet || git commit -m "chore: ASX log $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
