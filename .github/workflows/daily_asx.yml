name: Daily ASX Announcements

on:
  # ASX session in Sydney spans two UTC calendar days. Prior crons used 1-5 / 2-6 DOW
  # which skipped all of Sunday UTC (and left Monday UTC morning gaps), so scheduled
  # runs could disappear for 24h+. These lines fire every calendar day during hours
  # that cover ~10:00–16:00 Australia/Sydney in both AEST and AEDT; fetch_asx.py still
  # filters by AEST date, so weekend runs are cheap no-ops if the API returns nothing.
  # Minutes 3,23,43 reduce GitHub scheduler pile-ups.
  schedule:
    - cron: "3,23,43 22 * * *"
    - cron: "3,23,43 23 * * *"
    - cron: "3,23,43 0 * * *"
    - cron: "3,23,43 1 * * *"
    - cron: "3,23,43 2 * * *"
    - cron: "3,23,43 3 * * *"
    - cron: "3,23,43 4 * * *"
    - cron: "3,23,43 5 * * *"
    - cron: "3,23,43 6 * * *"
    - cron: "3,23,43 7 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      date:
        description: "Date to fetch (YYYY-MM-DD). Leave blank for today AEST."
        required: false
        default: ""

# Secrets (Settings → Secrets and variables → Actions):
#   GROQ_API_KEY        — recommended; failover if Anthropic errors
#   ANTHROPIC_API_KEY   — optional primary (Claude); omit to use Groq only
# Variables (optional overrides; leave unset to use fetch_asx.py defaults):
#   GROQ_MODEL, ANTHROPIC_MODEL
jobs:
  fetch-and-summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit logs/ back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ASX fetcher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python fetch_asx.py --date "${{ github.event.inputs.date }}"
          else
            python fetch_asx.py
          fi

      - name: Commit and push log file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git diff --cached --quiet || git commit -m "chore: ASX log $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
